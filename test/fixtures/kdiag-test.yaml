---
apiVersion: v1
kind: Namespace
metadata:
  name: kdiag-test
---
# Deployment: multiple replicas for selector and all-pods tests.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app
  namespace: kdiag-test
  labels:
    app: test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 64Mi
---
# Static pod with a known name for the single-pod-by-name tests.
apiVersion: v1
kind: Pod
metadata:
  name: kdiag-static
  namespace: kdiag-test
  labels:
    app: static
spec:
  containers:
    - name: nginx
      image: nginx:alpine
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          memory: 32Mi
---
# Pod that exits immediately — will enter CrashLoopBackOff for state tests.
apiVersion: v1
kind: Pod
metadata:
  name: kdiag-crasher
  namespace: kdiag-test
  labels:
    app: crasher
spec:
  restartPolicy: Always
  containers:
    - name: crasher
      image: busybox:latest
      command: ["sh", "-c", "exit 1"]
