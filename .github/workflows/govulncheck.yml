name: govulncheck

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly Monday 05:00 UTC — catches new CVE disclosures against
    # unchanged dependencies.
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  govulncheck:
    name: scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # Pinned to a tagged release so dependabot can bump it; using @latest
      # would silently move the tool and weaken supply-chain hygiene.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: Scan
        run: govulncheck ./...
